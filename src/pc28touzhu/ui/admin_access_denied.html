<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pc28touzhu 后台访问受限</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #eef4f6;
            --surface: rgba(255, 255, 255, 0.92);
            --line: rgba(22, 48, 58, 0.12);
            --text: #14252d;
            --muted: #5e7480;
            --primary: #0f766e;
            --danger: #bf4d3a;
            --shadow: 0 24px 52px rgba(14, 38, 48, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Noto Sans SC", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(15, 118, 110, 0.16), transparent 26%),
                linear-gradient(180deg, #f8fbfc 0%, var(--bg) 100%);
        }

        .panel {
            width: min(640px, 100%);
            padding: 28px;
            border: 1px solid var(--line);
            border-radius: 28px;
            background: var(--surface);
            box-shadow: var(--shadow);
        }

        .eyebrow {
            margin: 0;
            color: var(--primary);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        h1 {
            margin: 14px 0 10px;
            font-size: clamp(2rem, 5vw, 3rem);
            line-height: 1.1;
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.7;
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 0 18px;
            border-radius: 999px;
            border: 1px solid transparent;
            font-weight: 700;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #0f5a76);
            color: #fff;
        }

        .btn-ghost {
            border-color: rgba(20, 37, 45, 0.12);
            background: rgba(255, 255, 255, 0.72);
            color: var(--text);
        }

        .tip {
            margin-top: 18px;
            padding: 14px 16px;
            border-radius: 18px;
            background: rgba(191, 77, 58, 0.06);
            color: var(--danger);
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main class="panel">
        <p class="eyebrow">后台控制台</p>
        <h1>后台访问受限</h1>
        <p>__ADMIN_ACCESS_MESSAGE__</p>
        <div class="tip">`/admin` 已切换为正式后台入口，页面访问控制现在由服务端执行。</div>
        <div class="actions">
            <a class="btn btn-primary" href="/">返回首页</a>
            <a class="btn btn-ghost" href="/autobet">进入自动投注总控台</a>
        </div>
    </main>
</body>
</html>
