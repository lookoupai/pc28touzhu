<dialog id="accountDialog" class="account-dialog" aria-label="账户">
    <div class="account-dialog-shell">
        <div class="account-dialog-header">
            <div>
                <p class="panel-kicker">账户</p>
                <h2 data-auth-panel-title>登录与账户</h2>
            </div>
            <button id="accountDialogCloseBtn" class="ghost-btn account-dialog-close" type="button">关闭</button>
        </div>
        <div class="account-card">
            <strong id="currentUsername">未登录</strong>
            <span id="currentUserMeta">请先注册或登录</span>
        </div>
        <div id="authenticatedAccountPanel" class="auth-password-panel" hidden>
            <p class="auth-helper-text">当前会话已建立。这里统一处理密码维护和退出登录。</p>
            <div class="auth-inline-actions">
                <button id="changePasswordToggleBtn" class="ghost-btn" type="button">修改密码</button>
                <button id="authenticatedLogoutBtn" class="ghost-btn danger-btn" type="button">退出登录</button>
            </div>
        </div>
        <form id="authForm" class="auth-form auth-grid">
            <label>
                <span>用户名</span>
                <input id="authUsername" class="text-input" type="text" autocomplete="username" required>
            </label>
            <label>
                <span>邮箱</span>
                <input id="authEmail" class="text-input" type="email" autocomplete="email">
            </label>
            <label>
                <span>密码</span>
                <input id="authPassword" class="text-input" type="password" autocomplete="current-password" required>
            </label>
            <div class="form-actions wide">
                <button id="registerBtn" class="ghost-btn" type="button">注册</button>
                <button id="loginBtn" class="primary-btn" type="button">登录</button>
                <button id="logoutBtn" class="ghost-btn danger-btn" type="button" hidden>退出</button>
            </div>
        </form>
    </div>
</dialog>
